[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  external_node_modules = [
    "express",
    "@netlify/functions",
    "exceljs",
    "pdf2json",
    "pdf2pic",
    "tesseract.js",
    "sharp",
    "canvas",
    "multer",
    "@supabase/supabase-js",
    "serverless-http"
  ]
  node_bundler = "esbuild"

# API calls → Netlify Function
[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
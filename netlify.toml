[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist"  
[functions]
external_node_modules = ["express"]
node_bundler = "esbuild"

# Your existing API redirect
[[redirects]]
force = true
from = "/api/*"
status = 200
to = "/.netlify/functions/api/:splat"

#  The SPA fallback redirect
[[redirects]]
from = "/*"
to = "/index.html"
status = 200